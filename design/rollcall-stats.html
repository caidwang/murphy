<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <div class="w-full h-screen flex" style="background: var(--bg-primary);">
        <!-- 左侧导航栏 -->
        <aside class="w-64 flex flex-col" style="background: var(--bg-white); border-right: 1px solid var(--border-color);">
            <div class="p-6" style="border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-book text-sm" style="color: var(--text-primary);"></i>
                    <div>
                        <p class="font-bold text-lg" style="color: var(--text-primary);">教学互动</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4">
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">导航</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('home.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                                <i class="fas fa-home w-5"></i>
                                <span>首页</span>
                            </button>
                        </li>
                    </ul>
                </div>
                
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">功能</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('rollcall.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                                <i class="fas fa-random w-5"></i>
                                <span>欧皇选拔器</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="flex-1 overflow-y-auto" style="background: var(--bg-primary);">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center space-x-4">
                        <button onclick="navigateTo('rollcall.html')" class="transition" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h1 class="notion-title">数据统计</h1>
                    </div>
                    <select class="input-field">
                        <option>2024年1月</option>
                        <option>2024年2月</option>
                        <option>2024年3月</option>
                    </select>
                </div>

                <!-- 统计概览 - 彩色卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <!-- 总点名次数 - 蓝色 -->
                    <div class="card-shadow p-6" style="background: var(--color-blue); border-color: rgba(35, 131, 226, 0.2);">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm mb-1 notion-caption" style="color: var(--text-secondary);">总点名次数</p>
                                <p class="text-3xl font-bold" style="color: var(--color-blue-dark);">156</p>
                            </div>
                            <div class="w-12 h-12 rounded flex items-center justify-center" style="background: var(--color-blue-dark);">
                                <i class="fas fa-random text-xl" style="color: white;"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 总点赞数 - 绿色 -->
                    <div class="card-shadow p-6" style="background: var(--color-green); border-color: rgba(15, 123, 108, 0.2);">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm mb-1 notion-caption" style="color: var(--text-secondary);">总点赞数</p>
                                <p class="text-3xl font-bold" style="color: var(--color-green-dark);">98</p>
                            </div>
                            <div class="w-12 h-12 rounded flex items-center justify-center" style="background: var(--color-green-dark);">
                                <i class="fas fa-thumbs-up text-xl" style="color: white;"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 需要改进 - 橙色 -->
                    <div class="card-shadow p-6" style="background: var(--color-orange); border-color: rgba(217, 115, 13, 0.2);">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm mb-1 notion-caption" style="color: var(--text-secondary);">需要改进</p>
                                <p class="text-3xl font-bold" style="color: var(--color-orange-dark);">12</p>
                            </div>
                            <div class="w-12 h-12 rounded flex items-center justify-center" style="background: var(--color-orange-dark);">
                                <i class="fas fa-angry text-xl" style="color: white;"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 红榜 - 黄色/金色主题 -->
                <div class="card-shadow p-6 mb-6" style="background: var(--color-yellow); border-color: rgba(217, 115, 13, 0.2);">
                    <div class="flex items-center space-x-2 mb-6">
                        <i class="fas fa-trophy text-xl" style="color: var(--color-yellow-dark);"></i>
                        <h2 class="notion-subtitle" style="color: var(--color-yellow-dark);">红榜</h2>
                        <span class="notion-caption">(点赞次数最多)</span>
                    </div>
                    <div class="space-y-3">
                        <!-- 第一名 -->
                        <div class="flex items-center justify-between p-4 rounded" style="background: rgba(255, 255, 255, 0.6); border-left: 3px solid var(--color-yellow-dark);">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold" style="background: var(--color-yellow-dark);">1</div>
                                <div>
                                    <p class="font-bold" style="color: var(--text-primary);">张三</p>
                                    <p class="notion-caption">学号: 2024001</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6">
                                <div class="text-center">
                                    <p class="notion-caption">被点次数</p>
                                    <p class="font-bold" style="color: var(--text-primary);">15</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">点赞</p>
                                    <p class="font-bold" style="color: var(--color-green-dark);">12</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">改进</p>
                                    <p class="font-bold" style="color: var(--color-orange-dark);">1</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 第二名 -->
                        <div class="flex items-center justify-between p-4 rounded" style="background: rgba(255, 255, 255, 0.4);">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold" style="background: var(--border-color); color: var(--text-secondary);">2</div>
                                <div>
                                    <p class="font-bold" style="color: var(--text-primary);">李四</p>
                                    <p class="notion-caption">学号: 2024002</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6">
                                <div class="text-center">
                                    <p class="notion-caption">被点次数</p>
                                    <p class="font-bold" style="color: var(--text-primary);">12</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">点赞</p>
                                    <p class="font-bold" style="color: var(--color-green-dark);">10</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">改进</p>
                                    <p class="font-bold" style="color: var(--color-orange-dark);">0</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 第三名 -->
                        <div class="flex items-center justify-between p-4 rounded" style="background: rgba(255, 255, 255, 0.4);">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold" style="background: var(--border-color); color: var(--text-secondary);">3</div>
                                <div>
                                    <p class="font-bold" style="color: var(--text-primary);">王五</p>
                                    <p class="notion-caption">学号: 2024003</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6">
                                <div class="text-center">
                                    <p class="notion-caption">被点次数</p>
                                    <p class="font-bold" style="color: var(--text-primary);">10</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">点赞</p>
                                    <p class="font-bold" style="color: var(--color-green-dark);">8</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">改进</p>
                                    <p class="font-bold" style="color: var(--color-orange-dark);">1</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 黑榜 - 红色/橙色主题 -->
                <div class="card-shadow p-6" style="background: var(--color-red); border-color: rgba(225, 98, 89, 0.2);">
                    <div class="flex items-center space-x-2 mb-6">
                        <i class="fas fa-exclamation-triangle text-xl" style="color: var(--color-red-dark);"></i>
                        <h2 class="notion-subtitle" style="color: var(--color-red-dark);">黑榜</h2>
                        <span class="notion-caption">(需要改进次数最多)</span>
                    </div>
                    <div class="space-y-3">
                        <!-- 第一名 -->
                        <div class="flex items-center justify-between p-4 rounded" style="background: rgba(255, 255, 255, 0.6); border-left: 3px solid var(--color-red-dark);">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold" style="background: var(--color-red-dark);">1</div>
                                <div>
                                    <p class="font-bold" style="color: var(--text-primary);">赵六</p>
                                    <p class="notion-caption">学号: 2024004</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6">
                                <div class="text-center">
                                    <p class="notion-caption">被点次数</p>
                                    <p class="font-bold" style="color: var(--text-primary);">8</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">点赞</p>
                                    <p class="font-bold" style="color: var(--color-green-dark);">2</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">改进</p>
                                    <p class="font-bold" style="color: var(--color-red-dark);">5</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 第二名 -->
                        <div class="flex items-center justify-between p-4 rounded" style="background: rgba(255, 255, 255, 0.4);">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold" style="background: var(--border-color); color: var(--text-secondary);">2</div>
                                <div>
                                    <p class="font-bold" style="color: var(--text-primary);">钱七</p>
                                    <p class="notion-caption">学号: 2024005</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6">
                                <div class="text-center">
                                    <p class="notion-caption">被点次数</p>
                                    <p class="font-bold" style="color: var(--text-primary);">6</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">点赞</p>
                                    <p class="font-bold" style="color: var(--color-green-dark);">1</p>
                                </div>
                                <div class="text-center">
                                    <p class="notion-caption">改进</p>
                                    <p class="font-bold" style="color: var(--color-red-dark);">4</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function navigateTo(page) {
            if (window.parent) {
                window.parent.postMessage({ type: 'navigate', page: page }, '*');
            } else {
                window.location.href = page;
            }
        }
    </script>
</body>
</html>
