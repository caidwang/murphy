<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <div class="w-full h-screen flex" style="background: var(--bg-primary);">
        <!-- 左侧导航栏 -->
        <aside class="w-64 flex flex-col" style="background: var(--bg-white); border-right: 1px solid var(--border-color);">
            <div class="p-6" style="border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-book text-sm" style="color: var(--text-primary);"></i>
                    <div>
                        <p class="font-bold text-lg" style="color: var(--text-primary);">教学互动</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4">
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">导航</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('home.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                                <i class="fas fa-home w-5"></i>
                                <span>首页</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="flex-1 overflow-y-auto" style="background: var(--bg-primary);">
            <div class="p-8">
                <div class="flex items-center space-x-4 mb-8">
                    <button onclick="navigateTo('home.html')" class="transition" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h1 class="notion-title">三年级一班</h1>
                </div>
                
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-4 uppercase tracking-wider" style="color: var(--text-tertiary);">功能</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- 欧皇选拔器 -->
                        <div onclick="navigateTo('rollcall.html')" class="card-shadow-hover p-6">
                            <div class="flex items-center space-x-4 mb-4">
                                <div class="w-12 h-12 rounded flex items-center justify-center text-xl" style="background: var(--text-primary); color: var(--bg-white);">
                                    <i class="fas fa-random"></i>
                                </div>
                                <div>
                                    <h3 class="notion-subtitle">欧皇选拔器</h3>
                                    <p class="notion-caption">随机抽取学生</p>
                                </div>
                            </div>
                            <p class="notion-caption">支持连续点名，记录反馈数据</p>
                        </div>

                        <!-- 占位功能卡片 -->
                        <div class="card-shadow p-6 opacity-40">
                            <div class="flex items-center space-x-4 mb-4">
                                <div class="w-12 h-12 rounded flex items-center justify-center text-xl" style="background: var(--border-color); color: var(--text-tertiary);">
                                    <i class="fas fa-puzzle-piece"></i>
                                </div>
                                <div>
                                    <h3 class="notion-subtitle" style="color: var(--text-tertiary);">更多功能</h3>
                                    <p class="notion-caption" style="color: var(--text-tertiary);">即将上线</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function navigateTo(page) {
            if (window.parent) {
                window.parent.postMessage({ type: 'navigate', page: page }, '*');
            } else {
                window.location.href = page;
            }
        }
    </script>
</body>
</html>
