<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学互动系统 - Mac桌面应用原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'Alibaba PuHuiTi';
            src: url('https://at.alicdn.com/t/webfont_8vqu7r43qnp.woff2') format('woff2'),
                 url('https://at.alicdn.com/t/webfont_8vqu7r43qnp.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        * { 
            font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; 
        }
    </style>
</head>
<body style="background: #f5f5f5;">
    <div class="w-full h-screen flex flex-col" style="background: #f5f5f5;">
        <!-- Mac窗口标题栏 - 极简风格 -->
        <div class="flex items-center justify-between px-4 py-2" style="background: #fafafa; border-bottom: 1px solid #e0e0e0;">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full" style="background: #ff5f57;"></div>
                <div class="w-3 h-3 rounded-full" style="background: #ffbd2e;"></div>
                <div class="w-3 h-3 rounded-full" style="background: #28ca42;"></div>
            </div>
            <div class="flex-1 text-center">
                <span class="text-sm font-medium" style="color: #000;">教学互动系统</span>
            </div>
            <div class="w-12"></div>
        </div>
        
        <!-- 主内容区 -->
        <div class="flex-1 overflow-hidden" style="background: #f5f5f5;">
            <iframe id="mainFrame" src="home.html" class="w-full h-full border-0"></iframe>
        </div>
    </div>
    
    <script>
        // 简单的路由系统
        function navigateTo(page) {
            document.getElementById('mainFrame').src = page;
        }
        
        // 监听来自iframe的消息
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'navigate') {
                navigateTo(event.data.page);
            }
        });
    </script>
</body>
</html>
