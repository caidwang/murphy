<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <div class="w-full h-screen flex" style="background: var(--bg-primary);">
        <!-- 左侧菜单 -->
        <aside class="w-64 flex flex-col" style="background: var(--bg-white); border-right: 1px solid var(--border-color);">
            <div class="p-6" style="border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-book text-sm" style="color: var(--text-primary);"></i>
                    <div>
                        <p class="font-bold text-lg" style="color: var(--text-primary);">管理</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4">
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">功能</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="loadPage('class-management.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item-active">
                                <i class="fas fa-users w-5"></i>
                                <span class="font-medium">班级管理</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="p-4" style="border-top: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium" style="background: var(--text-primary); color: var(--bg-white);">
                        管
                    </div>
                    <div>
                        <p class="text-sm font-medium" style="color: var(--text-primary);">管理员</p>
                        <p class="text-xs" style="color: var(--text-tertiary);">admin@example.com</p>
                    </div>
                </div>
                <button onclick="navigateTo('home.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                    <i class="fas fa-home w-5"></i>
                    <span>返回首页</span>
                </button>
            </div>
        </aside>

        <!-- 右侧内容区 -->
        <main class="flex-1 overflow-hidden" style="background: var(--bg-primary);">
            <iframe id="adminContent" src="class-management.html" class="w-full h-full border-0"></iframe>
        </main>
    </div>

    <script>
        function navigateTo(page) {
            if (window.parent) {
                window.parent.postMessage({ type: 'navigate', page: page }, '*');
            } else {
                window.location.href = page;
            }
        }

        function loadPage(page) {
            document.getElementById('adminContent').src = page;
        }
    </script>
</body>
</html>
