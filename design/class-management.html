<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <div class="w-full h-screen flex flex-col" style="background: var(--bg-primary);">
        <!-- 顶部操作栏 -->
        <header class="px-8 py-6 flex items-center justify-between" style="background: var(--bg-white); border-bottom: 1px solid var(--border-color);">
            <h1 class="notion-title">班级管理</h1>
            <button onclick="navigateTo('class-edit.html?mode=create')" class="px-6 py-2 rounded-lg transition btn-primary">
                <i class="fas fa-plus mr-2"></i>
                <span>创建新班级</span>
            </button>
        </header>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-y-auto p-8" style="background: var(--bg-primary);">
            <div class="max-w-7xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- 班级卡片 -->
                    <div class="card-shadow-hover overflow-hidden">
                        <div class="h-40 relative" style="background: var(--text-primary);">
                            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400&h=200&fit=crop" alt="班级背景" class="w-full h-full object-cover opacity-60">
                            <div class="absolute top-2 right-2">
                                <button onclick="navigateTo('class-edit.html?mode=edit&id=1')" class="w-8 h-8 rounded-full flex items-center justify-center transition" style="background: var(--bg-white); color: var(--text-primary);" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background='var(--bg-white)'">
                                    <i class="fas fa-edit text-sm"></i>
                                </button>
                            </div>
                            <div class="absolute bottom-4 left-4 text-white">
                                <h3 class="text-lg font-bold">三年级一班</h3>
                                <p class="text-sm" style="color: #ccc;">45名学生</p>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex items-center justify-between text-sm mb-3" style="color: var(--text-secondary);">
                                <span><i class="fas fa-users mr-1"></i> 45人</span>
                                <span><i class="fas fa-calendar mr-1"></i> 2024年</span>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="navigateTo('class-edit.html?mode=edit&id=1')" class="flex-1 px-3 py-2 text-sm rounded transition btn-secondary">
                                    <i class="fas fa-edit mr-1"></i>编辑
                                </button>
                                <button class="px-3 py-2 text-sm rounded transition" style="border: 1px solid var(--border-color); color: var(--text-secondary);" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background='transparent'">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="card-shadow-hover overflow-hidden">
                        <div class="h-40 relative" style="background: var(--text-primary);">
                            <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400&h=200&fit=crop" alt="班级背景" class="w-full h-full object-cover opacity-60">
                            <div class="absolute top-2 right-2">
                                <button onclick="navigateTo('class-edit.html?mode=edit&id=2')" class="w-8 h-8 rounded-full flex items-center justify-center transition" style="background: var(--bg-white); color: var(--text-primary);" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background='var(--bg-white)'">
                                    <i class="fas fa-edit text-sm"></i>
                                </button>
                            </div>
                            <div class="absolute bottom-4 left-4 text-white">
                                <h3 class="text-lg font-bold">四年级二班</h3>
                                <p class="text-sm" style="color: #ccc;">38名学生</p>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex items-center justify-between text-sm mb-3" style="color: var(--text-secondary);">
                                <span><i class="fas fa-users mr-1"></i> 38人</span>
                                <span><i class="fas fa-calendar mr-1"></i> 2024年</span>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="navigateTo('class-edit.html?mode=edit&id=2')" class="flex-1 px-3 py-2 text-sm rounded-lg transition btn-secondary">
                                    <i class="fas fa-edit mr-1"></i>编辑
                                </button>
                                <button class="px-3 py-2 text-sm rounded transition" style="border: 1px solid var(--border-color); color: var(--text-secondary);" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background='transparent'">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function navigateTo(page) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigate', page: page }, '*');
            } else if (window.parent && window.parent.loadPage) {
                window.parent.loadPage(page);
            } else {
                window.location.href = page;
            }
        }
    </script>
</body>
</html>
