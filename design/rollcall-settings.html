<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <div class="w-full h-screen flex" style="background: var(--bg-primary);">
        <!-- 左侧导航栏 -->
        <aside class="w-64 flex flex-col" style="background: var(--bg-white); border-right: 1px solid var(--border-color);">
            <div class="p-6" style="border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-book text-sm" style="color: var(--text-primary);"></i>
                    <div>
                        <p class="font-bold text-lg" style="color: var(--text-primary);">教学互动</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4">
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">导航</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('home.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                                <i class="fas fa-home w-5"></i>
                                <span>首页</span>
                            </button>
                        </li>
                    </ul>
                </div>
                
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">功能</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('rollcall.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                                <i class="fas fa-random w-5"></i>
                                <span>欧皇选拔器</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="flex-1 overflow-y-auto" style="background: var(--bg-primary);">
            <div class="p-8">
                <div class="flex items-center space-x-4 mb-8">
                    <button onclick="navigateTo('rollcall.html')" class="transition" style="color: var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h1 class="notion-title">设置</h1>
                </div>

                <div class="max-w-3xl">
                    <div class="card-shadow p-8">
                        <h2 class="notion-subtitle mb-6">点名规则</h2>
                        
                        <div class="space-y-6">
                            <div class="flex items-center justify-between py-4" style="border-bottom: 1px solid var(--border-color);">
                                <div class="flex-1">
                                    <h3 class="font-medium mb-1" style="color: var(--text-primary);">点过后是否放回</h3>
                                    <p class="text-sm" style="color: var(--text-secondary);">开启后，已点过的学生可以再次被抽中</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" id="allowRepeat" checked>
                                    <div class="w-11 h-6 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all" style="background: var(--border-color); peer-checked:background: var(--text-primary);"></div>
                                </label>
                            </div>

                            <div class="flex items-center justify-between py-4" style="border-bottom: 1px solid var(--border-color);">
                                <div class="flex-1">
                                    <h3 class="font-medium mb-1" style="color: var(--text-primary);">自动保存反馈</h3>
                                    <p class="text-sm" style="color: var(--text-secondary);">自动保存每次点名的反馈数据</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" id="autoSave" checked>
                                    <div class="w-11 h-6 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all" style="background: var(--border-color); peer-checked:background: var(--text-primary);"></div>
                                </label>
                            </div>

                            <div class="flex items-center justify-between py-4">
                                <div class="flex-1">
                                    <h3 class="font-medium mb-1" style="color: var(--text-primary);">滚动速度</h3>
                                    <p class="text-sm" style="color: var(--text-secondary);">调整名字滚动的速度</p>
                                </div>
                                <select class="px-4 py-2 rounded-lg text-sm input-field">
                                    <option>慢速</option>
                                    <option selected>中速</option>
                                    <option>快速</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-8 flex justify-end space-x-4">
                            <button onclick="navigateTo('rollcall.html')" class="px-6 py-2 rounded-lg transition btn-secondary">
                                取消
                            </button>
                            <button onclick="saveSettings()" class="px-6 py-2 rounded-lg transition btn-primary">
                                保存设置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function navigateTo(page) {
            if (window.parent) {
                window.parent.postMessage({ type: 'navigate', page: page }, '*');
            } else {
                window.location.href = page;
            }
        }

        function saveSettings() {
            alert('设置已保存');
            navigateTo('rollcall.html');
        }
    </script>
</body>
</html>
