<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { font-family: 'Alibaba PuHuiTi', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <div class="w-full h-screen flex" style="background: var(--bg-primary);">
        <!-- 左侧导航栏 - Notion风格 -->
        <aside class="w-64 flex flex-col" style="background: var(--bg-white); border-right: 1px solid var(--border-color);">
            <div class="p-6" style="border-bottom: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-book text-sm" style="color: var(--text-primary);"></i>
                    <div>
                        <p class="font-bold text-lg" style="color: var(--text-primary);">教学互动</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4">
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">导航</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('home.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item-active">
                                <i class="fas fa-home w-5"></i>
                                <span class="font-medium">首页</span>
                            </button>
                        </li>
                    </ul>
                </div>
                
                <div class="mb-6">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-wider" style="color: var(--text-tertiary);">功能</p>
                    <ul class="space-y-1">
                        <li>
                            <button onclick="navigateTo('admin.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded transition nav-item">
                                <i class="fas fa-cog w-5"></i>
                                <span>管理</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="p-4" style="border-top: 1px solid var(--border-color);">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium" style="background: var(--text-primary); color: var(--bg-white);">
                        管
                    </div>
                    <div>
                        <p class="text-sm font-medium" style="color: var(--text-primary);">管理员</p>
                        <p class="text-xs" style="color: var(--text-tertiary);">admin@example.com</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="flex-1 overflow-y-auto" style="background: var(--bg-primary);">
            <div class="p-8">
                <h1 class="notion-title mb-8">我的班级</h1>
                
                <!-- 班级列表 -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-6">
                    <!-- 示例班级卡片 -->
                    <div onclick="navigateTo('class.html')" class="card-shadow-hover overflow-hidden">
                        <div class="h-40 relative" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400&h=200&fit=crop" alt="班级背景" class="w-full h-full object-cover opacity-70">
                            <div class="absolute bottom-4 left-4 text-white">
                                <h3 class="text-lg font-bold">三年级一班</h3>
                                <p class="text-sm" style="color: rgba(255,255,255,0.9);">45名学生</p>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex items-center justify-between text-sm" style="color: var(--text-secondary);">
                                <span><i class="fas fa-users mr-1"></i> 45人</span>
                                <span><i class="fas fa-calendar mr-1"></i> 2024年</span>
                            </div>
                        </div>
                    </div>

                    <div onclick="navigateTo('class.html')" class="card-shadow-hover overflow-hidden">
                        <div class="h-40 relative" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400&h=200&fit=crop" alt="班级背景" class="w-full h-full object-cover opacity-70">
                            <div class="absolute bottom-4 left-4 text-white">
                                <h3 class="text-lg font-bold">四年级二班</h3>
                                <p class="text-sm" style="color: rgba(255,255,255,0.9);">38名学生</p>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex items-center justify-between text-sm" style="color: var(--text-secondary);">
                                <span><i class="fas fa-users mr-1"></i> 38人</span>
                                <span><i class="fas fa-calendar mr-1"></i> 2024年</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 创建班级入口 -->
                <div onclick="navigateTo('class-edit.html?mode=create')" class="card-shadow-hover p-8 text-center">
                    <i class="fas fa-plus text-4xl mb-4" style="color: var(--text-tertiary);"></i>
                    <h3 class="notion-subtitle mb-2">创建新班级</h3>
                    <p class="notion-caption">点击创建新班级</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function navigateTo(page) {
            if (window.parent) {
                window.parent.postMessage({ type: 'navigate', page: page }, '*');
            } else {
                window.location.href = page;
            }
        }
    </script>
</body>
</html>
