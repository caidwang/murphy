name: Build Electron Apps

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: electron-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            artifact-name: murphy-macos-arm64
          - arch: x64
            runner: macos-15-intel
            artifact-name: murphy-macos-x64
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Rebuild native dependencies for macOS ${{ matrix.arch }}
        run: npx electron-builder install-app-deps --arch=${{ matrix.arch }}

      - name: Package macOS app
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main process
        run: npm run build

      - name: Rebuild native dependencies for Windows x64
        run: npx electron-builder install-app-deps --arch=x64

      - name: Package Windows app
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: murphy-windows-x64
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Collect release binaries
        shell: bash
        run: |
          mkdir -p release-binaries
          find release-assets -type f \( -name '*.dmg' -o -name '*.exe' \) -print -exec cp {} release-binaries/ \;
          ls -lh release-binaries
          test "$(find release-binaries -type f | wc -l | tr -d ' ')" = "3"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package-version.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SHORT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          short_sha="${SHORT_SHA::7}"
          tag="v${VERSION}-${RUN_NUMBER}.${RUN_ATTEMPT}"
          gh release create "$tag" release-binaries/* \
            --title "Murphy v${VERSION} build ${RUN_NUMBER}.${RUN_ATTEMPT}" \
            --notes "Automated Electron release from ${GITHUB_REF_NAME} (${short_sha})." \
            --target "$GITHUB_SHA" \
            --latest
